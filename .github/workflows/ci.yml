name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build, test, lint, and scan
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.go == '1.27rc1' }}
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25", "1.26", "1.27rc1"]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go == '1.27rc1' && '1.27.0-rc.1' || format('{0}.x', matrix.go) }}
          allow-prereleases: true
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2

      - name: Run tests
        run: go test -v -coverprofile=coverage.txt ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.txt | tail -1

      - name: Upload coverage report
        if: matrix.go == '1.26'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.txt
          retention-days: 30

      - name: Build plugin binary
        run: go build -v ./cmd/plugin

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
